<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM76 Games Showcase - Multimídia 76</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <h1 class="logo neon-glow-pink">TM76</h1>
                    <span class="subtitle">Games Showcase</span>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h2 class="hero-title neon-glow-orange">MULTIMÍDIA 76</h2>
            <p class="hero-subtitle">Explore os projetos de jogos desenvolvidos pela turma de Multimídia 76</p>
            <div class="pulse-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </section>

    <!-- Projects Gallery -->
    <section class="projects-section">
        <div class="container">
            <div class="projects-grid" id="projectsGrid">
                <!-- Projects will be inserted here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Comments Section -->
    <section class="comments-section">
        <div class="container">
            <div class="comments-wrapper">
                <h2 class="comments-title neon-glow-cyan">Deixe um Comentário</h2>

                <!-- Comment Form -->
                <form class="comment-form" id="commentForm">
                    <div class="form-group">
                        <label for="authorInput">Seu Nome</label>
                        <input type="text" id="authorInput" placeholder="Digite seu nome..." required>
                    </div>

                    <div class="form-group">
                        <label for="textInput">Seu Comentário</label>
                        <textarea id="textInput" placeholder="Compartilhe seu feedback sobre os projetos..." rows="4" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        <span>Enviar Comentário</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>

                <!-- Comments List -->
                <div class="comments-list">
                    <h3 class="comments-count" id="commentsCount">0 Comentários</h3>
                    <div class="comments-container" id="commentsContainer">
                        <p class="no-comments">Nenhum comentário ainda. Seja o primeiro a comentar!</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 TM76 Games Showcase - Multimídia 76 | SENAC</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
